[settings]
experimental = true
disable_backends = ["asdf", "vfox"]
idiomatic_version_file_enable_tools = ["python"]

[settings.pipx]
uvx = true

[settings.npm]
package_manager = "pnpm"

[tools]
# Runtimes and package managers
deno = "latest"
go = "latest"
node = "lts"
pnpm = "latest"
rust = "latest"
uv = "latest"

# Development tools
pre-commit = "latest"
terraform = "latest"
ty = "latest"

# Default backend tools
1password-cli = "latest"
acli = "latest"
awscli = "latest"
bat = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
ghq = "latest"
jq = "latest"
lazygit = "latest"
neovim = "latest"
ripgrep = "latest"
starship = "latest"
yazi = "latest"
zellij = "latest"
zoxide = "latest"
claude-code = "latest"

# Cargo tools
"cargo:eza" = "latest"

# npm packages
"npm:@aikidosec/safe-chain" = "latest"
"npm:@typescript/native-preview" = "latest"
"npm:agent-browser" = "latest"
"npm:czg" = "latest"

# pipx packages
"pipx:claude-code-log" = "latest"
"pipx:git-filter-repo" = "latest"
"pipx:snowflake-cli" = "latest"
